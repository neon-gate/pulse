services:
  mongo:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2
    container_name: nats-bus
    ports:
      - "4222:4222"
      - "8222:8222"

  micro-auth:
    build:
      context: .
      dockerfile: ./apps/bc-auth/micro-jwt-session/Dockerfile
    container_name: micro-auth
    ports:
      - "7000:7000"
    env_file:
      - ./apps/bc-auth/micro-jwt-session/.env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  micro-player:
    build:
      context: .
      dockerfile: ./apps/micro-player/Dockerfile
    container_name: micro-player
    ports:
      - "7001:7001"
    environment:
      PORT: "7001"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_PLAYER_QUEUE: player.queue
    depends_on:
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.development
    depends_on:
      micro-auth:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo_data:

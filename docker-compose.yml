version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - '27017:27017'
    volumes:
      - mongo_auth_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-reasoning:
    image: mongo:7
    container_name: mongo-reasoning
    ports:
      - '27018:27017'
    volumes:
      - mongo_reasoning_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  redis-cognition:
    image: redis:7-alpine
    container_name: redis-cognition
    ports:
      - '6379:6379'
    volumes:
      - redis_cognition_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--jetstream', '--http_port', '8222']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 10

  minio-soundgarden:
    image: minio/minio:latest
    container_name: minio-soundgarden
    ports:
      - '9000:9000'
      - '9001:9001'
    env_file:
      - infrastructure/minio/soundgarden/.env
    volumes:
      - minio_soundgarden_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-soundgarden-init:
    image: minio/mc:latest
    container_name: minio-soundgarden-init
    depends_on:
      minio-soundgarden:
        condition: service_healthy
    env_file:
      - infrastructure/minio/soundgarden/.env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio-soundgarden:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/tracks;
        echo 'Soundgarden MinIO bucket ready';
      "

  minio-fingerprint:
    image: minio/minio:latest
    container_name: minio-fingerprint
    ports:
      - '9010:9000'
      - '9011:9001'
    env_file:
      - infrastructure/minio/fingerprint/.env
    volumes:
      - minio_fingerprint_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-fingerprint-init:
    image: minio/mc:latest
    container_name: minio-fingerprint-init
    depends_on:
      minio-fingerprint:
        condition: service_healthy
    env_file:
      - infrastructure/minio/fingerprint/.env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio-fingerprint:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/tracks;
        echo 'Fingerprint MinIO bucket ready';
      "

  minio-transcription:
    image: minio/minio:latest
    container_name: minio-transcription
    ports:
      - '9020:9000'
      - '9021:9001'
    env_file:
      - infrastructure/minio/transcription/.env
    volumes:
      - minio_transcription_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-transcription-init:
    image: minio/mc:latest
    container_name: minio-transcription-init
    depends_on:
      minio-transcription:
        condition: service_healthy
    env_file:
      - infrastructure/minio/transcription/.env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio-transcription:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/tracks;
        echo 'Transcription MinIO bucket ready';
      "

  # ── Application services ─────────────────────────────────────────────────────

  authority:
    build:
      context: .
      dockerfile: ./domain/identity/authority/Dockerfile
    container_name: authority
    ports:
      - '7000:7000'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - domain/identity/authority/.env
    restart: unless-stopped

  soundgarden:
    build:
      context: .
      dockerfile: ./domain/ingestion/soundgarden/Dockerfile
    container_name: soundgarden
    ports:
      - '7100:7100'
    depends_on:
      nats:
        condition: service_healthy
      minio-soundgarden:
        condition: service_healthy
      minio-fingerprint:
        condition: service_healthy
      minio-transcription:
        condition: service_healthy
    env_file:
      - domain/ingestion/soundgarden/.env
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped

  backstage:
    build:
      context: .
      dockerfile: ./domain/realtime/backstage/Dockerfile
    container_name: backstage
    ports:
      - '4001:4001'
    depends_on:
      nats:
        condition: service_healthy
    env_file:
      - domain/realtime/backstage/.env
    restart: unless-stopped

  cognition-fake:
    build:
      context: .
      dockerfile: ./domain/ai/fake-cognition/Dockerfile
    container_name: cognition-fake
    ports:
      - '7300:7300'
    depends_on:
      nats:
        condition: service_healthy
    env_file:
      - domain/ai/fake-cognition/.env
    restart: unless-stopped

  fingerprint:
    build:
      context: .
      dockerfile: ./domain/ai/fingerprint/Dockerfile
    container_name: fingerprint
    ports:
      - '7200:7200'
    depends_on:
      nats:
        condition: service_healthy
      redis-cognition:
        condition: service_healthy
      minio-fingerprint:
        condition: service_healthy
    env_file:
      - domain/ai/fingerprint/.env
    restart: unless-stopped

  transcription:
    build:
      context: .
      dockerfile: ./domain/ai/transcription/Dockerfile
    container_name: transcription
    ports:
      - '7201:7201'
    depends_on:
      nats:
        condition: service_healthy
      redis-cognition:
        condition: service_healthy
      minio-transcription:
        condition: service_healthy
    env_file:
      - domain/ai/transcription/.env
    restart: unless-stopped

  reasoning:
    build:
      context: .
      dockerfile: ./domain/ai/reasoning/Dockerfile
    container_name: reasoning
    ports:
      - '7202:7202'
    depends_on:
      nats:
        condition: service_healthy
      mongo-reasoning:
        condition: service_healthy
    env_file:
      - domain/ai/reasoning/.env
    restart: unless-stopped

  pulse:
    build:
      context: .
      dockerfile: ./apps/pulse/Dockerfile
    container_name: pulse
    ports:
      - '3000:3000'
    depends_on:
      authority:
        condition: service_started
    env_file:
      - apps/pulse/.env
    restart: unless-stopped

volumes:
  mongo_auth_data:
  mongo_reasoning_data:
  redis_cognition_data:
  minio_soundgarden_data:
  minio_fingerprint_data:
  minio_transcription_data:
  uploads:

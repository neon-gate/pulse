version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - '27017:27017'
    volumes:
      - mongo_auth_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-sempiternal:
    image: mongo:7
    container_name: mongo-sempiternal
    ports:
      - '27018:27017'
    volumes:
      - mongo_sempiternal_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  redis-cognition:
    image: redis:7-alpine
    container_name: redis-cognition
    ports:
      - '6379:6379'
    volumes:
      - redis_cognition_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--jetstream', '--http_port', '8222']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - '9000:9000'
      - '9001:9001'
    env_file:
      - infrastructure/minio/.env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - infrastructure/minio/.env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/uploads;
        mc mb --ignore-existing local/fingerprints;
        mc mb --ignore-existing local/transcripts;
        mc mb --ignore-existing local/artifacts;
        echo 'MinIO buckets ready';
      "

  # ── Application services ─────────────────────────────────────────────────────

  authority:
    build:
      context: .
      dockerfile: ./domain/identity/authority/Dockerfile
    container_name: authority
    ports:
      - '7000:7000'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - domain/identity/authority/.env
    restart: unless-stopped

  soundgarden:
    build:
      context: .
      dockerfile: ./domain/ingestion/soundgarden/Dockerfile
    container_name: soundgarden
    ports:
      - '7100:7100'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - domain/ingestion/soundgarden/.env
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped

  backstage:
    build:
      context: .
      dockerfile: ./domain/realtime/backstage/Dockerfile
    container_name: backstage
    ports:
      - '4001:4001'
    depends_on:
      nats:
        condition: service_healthy
    env_file:
      - domain/realtime/backstage/.env
    restart: unless-stopped

  sempiternal:
    build:
      context: .
      dockerfile: ./apps/sempiternal/Dockerfile
    container_name: sempiternal
    ports:
      - '7200:7200'
    depends_on:
      nats:
        condition: service_healthy
      redis-cognition:
        condition: service_healthy
      mongo-sempiternal:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - apps/sempiternal/.env
    restart: unless-stopped

  pulse:
    build:
      context: .
      dockerfile: ./apps/pulse/Dockerfile
    container_name: pulse
    ports:
      - '3000:3000'
    depends_on:
      authority:
        condition: service_started
    env_file:
      - apps/pulse/.env
    restart: unless-stopped

volumes:
  mongo_auth_data:
  mongo_sempiternal_data:
  redis_cognition_data:
  minio_data:
  uploads:

version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand(\"ping\").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  micro-auth:
    build:
      context: .
      dockerfile: ./domain/identity/auth/Dockerfile
    container_name: micro-auth
    ports:
      - '7000:7000'
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: '7000'
      MONGO_URI: 'mongodb://mongo:27017'
      MONGO_DB_NAME: 'pulse-auth'
      JWT_SECRET: 'pulse-auth-secret'
      JWT_EXPIRES_IN: '15m'
      JWT_REFRESH_SECRET: 'pulse-auth-refresh-secret'
      JWT_REFRESH_EXPIRES_IN: '7d'
      GOOGLE_CLIENT_ID: 'local.google.client'
    restart: unless-stopped

  pulse:
    build:
      context: .
      dockerfile: ./apps/pulse/Dockerfile
    container_name: pulse
    ports:
      - '3000:3000'
    depends_on:
      micro-auth:
        condition: service_started
    environment:
      PORT: '3000'
      BFF_BASE_URL: 'http://micro-auth:7000/auth'
      BFF_API_TIMEOUT_MS: '10000'
    restart: unless-stopped

volumes:
  mongo_data:

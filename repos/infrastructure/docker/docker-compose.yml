services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: mongo-authority
    ports:
      - '27017:27017'
    volumes:
      - mongo_authority_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-shinod-ai:
    image: mongo:7
    container_name: mongo-shinod-ai
    ports:
      - '27018:27017'
    volumes:
      - mongo_shinod_ai_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10

  redis-shinoda:
    image: redis:7-alpine
    container_name: redis-shinoda
    ports:
      - '6379:6379'
    volumes:
      - redis_shinoda_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--jetstream', '--http_port', '8222']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/uploads;
        mc mb --ignore-existing local/fingerprints;
        mc mb --ignore-existing local/transcripts;
        mc mb --ignore-existing local/artifacts;
        mc mb --ignore-existing local/transcoded;
        echo 'MinIO buckets ready';
      "

  # ── Application services ─────────────────────────────────────────────────────

  authority:
    build:
      context: ../../..
      dockerfile: repos/domain/identity/authority/Dockerfile
    container_name: authority
    ports:
      - '7000:7000'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ../../domain/identity/authority/.env
    restart: unless-stopped

  slim-shady:
    build:
      context: ../../..
      dockerfile: repos/domain/identity/slim-shady/Dockerfile
    container_name: slim-shady
    ports:
      - '7400:7400'
    depends_on:
      mongo:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file:
      - ../../domain/identity/slim-shady/.env
    restart: unless-stopped

  soundgarden:
    build:
      context: ../../..
      dockerfile: repos/domain/streaming/soundgarden/Dockerfile
    container_name: soundgarden
    ports:
      - '7100:7100'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../domain/streaming/soundgarden/.env
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped

  backstage:
    build:
      context: ../../..
      dockerfile: repos/domain/realtime/backstage/Dockerfile
    container_name: backstage
    ports:
      - '4001:4001'
    depends_on:
      mongo:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file:
      - ../../domain/realtime/backstage/.env
    restart: unless-stopped

  shinod-ai:
    build:
      context: ../../..
      dockerfile: repos/domain/ai/shinod-ai/Dockerfile
    container_name: shinod-ai
    ports:
      - '7200:7200'
    depends_on:
      nats:
        condition: service_healthy
      redis-shinoda:
        condition: service_healthy
      mongo-shinod-ai:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../domain/ai/shinod-ai/.env
    restart: unless-stopped

  mockingbird:
    build:
      context: ../../..
      dockerfile: repos/domain/streaming/mockingbird/Dockerfile
    container_name: mockingbird
    ports:
      - '7201:7200'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../domain/streaming/mockingbird/.env
    volumes:
      - hls_staging:/tmp/hls
    restart: unless-stopped

  hybrid-storage:
    build:
      context: ../../..
      dockerfile: repos/domain/streaming/hybrid-storage/Dockerfile
    container_name: hybrid-storage
    ports:
      - '7300:7300'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../domain/streaming/hybrid-storage/.env
    volumes:
      - hls_staging:/tmp/hls
    restart: unless-stopped

  pulse:
    build:
      context: ../../..
      dockerfile: repos/apps/pulse/Dockerfile
    container_name: pulse
    ports:
      - '3000:3000'
    depends_on:
      authority:
        condition: service_started
    env_file:
      - ../../apps/pulse/.env
    restart: unless-stopped

  shinoda:
    build:
      context: ../../..
      dockerfile: repos/agents/shinoda/Dockerfile
    container_name: shinoda
    ports:
      - '4111:4111'
    depends_on:
      backstage:
        condition: service_started
    env_file:
      - ../../agents/shinoda/.env
    restart: unless-stopped

volumes:
  mongo_authority_data:
  mongo_shinod_ai_data:
  redis_shinoda_data:
  minio_data:
  uploads:
  hls_staging:
